function tokenize(line){
  const toks=[];let i=0;
  while(i<line.length){
    if(line[i]===' '||line[i]==='\t'){i++;continue;}
    if(line[i]==='"'){
      let s='';i++;
      while(i<line.length&&line[i]!=='"'){
        if(line[i]==='\\'&&i+1<line.length){
          const nc=line[i+1];
          if(nc==='n')s+='\n';else if(nc==='t')s+='\t';else s+=nc;
          i+=2;
        }else s+=line[i++];
      }
      i++;toks.push({t:'str',v:s});continue;
    }
    if(line[i]==='['||line[i]===']'||line[i]==='{'||line[i]==='}'){
      toks.push({t:'punc',v:line[i++]});continue;
    }
    if(line[i]===','){toks.push({t:'comma',v:','});i++;continue;}
    if(/\d/.test(line[i])||(line[i]==='-'&&/\d/.test(line[i+1]||'')&&(toks.length===0||['op','cmp','lparen','comma','punc'].includes(toks[toks.length-1].t)))){
      let n='';if(line[i]==='-')n+=line[i++];
      while(i<line.length&&/[\d.]/.test(line[i]))n+=line[i++];
      toks.push({t:'num',v:parseFloat(n)});continue;
    }
    if(line.slice(i,i+2)==='>='||line.slice(i,i+2)==='<='||line.slice(i,i+2)==='=='||line.slice(i,i+2)==='!='){
      toks.push({t:'cmp',v:line.slice(i,i+2)});i+=2;continue;
    }
    if(line[i]==='>'||line[i]==='<'){toks.push({t:'cmp',v:line[i++]});continue;}
    if(line[i]==='!'){toks.push({t:'unary',v:'!'});i++;continue;}
    if('+-*/%'.includes(line[i])){toks.push({t:'op',v:line[i++]});continue;}
    if(line[i]==='('){toks.push({t:'lparen',v:'('});i++;continue;}
    if(line[i]===')'){toks.push({t:'rparen',v:')'});i++;continue;}
    if(/[a-zA-Z_]/.test(line[i])){
      let w='';while(i<line.length&&/[a-zA-Z0-9_]/.test(line[i]))w+=line[i++];
      toks.push({t:'word',v:w});continue;
    }
    i++;
  }
  return toks;
}

function runVXC(code, stdinTokens){
  const lines=code.split('\n');
  const vars={};
  const fns={};
  const output=[];
  let stdinIdx=0;
  let stepCount=0;
  const MAX_STEPS=50000;

  function stdin_read(){
    if(stdinIdx<stdinTokens.length)return stdinTokens[stdinIdx++].trim();
    return '';
  }

  function callBuiltin(name,args,vars){
    const a=args;
    switch(name){
      case 'len': return typeof a[0]==='string'?a[0].length:(Array.isArray(a[0])?a[0].length:0);
      case 'upper': return String(a[0]).toUpperCase();
      case 'lower': return String(a[0]).toLowerCase();
      case 'trim': return String(a[0]).trim();
      case 'ltrim': return String(a[0]).trimStart();
      case 'rtrim': return String(a[0]).trimEnd();
      case 'reverse': return String(a[0]).split('').reverse().join('');
      case 'capitalize': return String(a[0]).split(' ').map(w=>w?w[0].toUpperCase()+w.slice(1).toLowerCase():'').join(' ');
      case 'title_case': return String(a[0]).split(' ').map(w=>w?w[0].toUpperCase()+w.slice(1):'').join(' ');
      case 'snake_case': return String(a[0]).trim().toLowerCase().replace(/\s+/g,'_');
      case 'camel_case': {const ws=String(a[0]).trim().split(/\s+/);return ws[0].toLowerCase()+ws.slice(1).map(w=>w?w[0].toUpperCase()+w.slice(1):'').join('');}
      case 'replace': return String(a[0]).replace(new RegExp(String(a[1]).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')),String(a[2]));
      case 'replace_all': return String(a[0]).split(String(a[1])).join(String(a[2]));
      case 'starts_with': return String(a[0]).startsWith(String(a[1]));

  function callUserFn(name, argVals, parentVars){
    const fn=fns[name];
    if(!fn)throw 'Undefined function: '+name;
    const localVars=Object.assign({},parentVars);
    fn.params.forEach((p,i)=>localVars[p]=argVals[i]??null);
    let retVal=null;
    try{execBlock(fn.body,0,fn.body.length,localVars);}
    catch(r){if(r&&r.__return__)retVal=r.value;else throw r;}
    return retVal;
  }

  function evalExpr(toks,vars){
    let pos=0;
    function peek(){return toks[pos];}
    function consume(){return toks[pos++];}
    function parseArray(){
      const arr=[];
      while(pos<toks.length&&!(peek().t==='punc'&&peek().v===']')){
        arr.push(parseAssign());
        if(peek()&&peek().t==='comma')consume();
      }
      if(peek()&&peek().v===']')consume();
      return arr;
    }
    function parseMap(){
      const map={};
      while(pos<toks.length&&!(peek().t==='punc'&&peek().v==='}')){
        const k=parseAssign();
        if(peek()&&peek().t==='comma')consume();
        const v=parseAssign();
        if(peek()&&peek().t==='comma')consume();
        map[String(k)]=v;
      }
      if(peek()&&peek().v==='}')consume();
      return map;
    }
    function parseCallArgs(){
      const args=[];
      if(peek()&&peek().t==='rparen')return args;
      while(pos<toks.length){
        args.push(parseAssign());
        if(peek()&&peek().t==='comma')consume();
        else break;
      }
      return args;
    }
    function primary(){
      if(pos>=toks.length)return undefined;
      const t=peek();
      if(t.t==='unary'&&t.v==='!'){consume();return !primary();}
      if(t.t==='punc'&&t.v==='['){consume();return parseArray();}
      if(t.t==='punc'&&t.v==='{'){consume();return parseMap();}
      if(t.t==='lparen'){consume();const v=parseAssign();if(peek()&&peek().t==='rparen')consume();return v;}
      if(t.t==='num'){consume();return t.v;}
      if(t.t==='str'){consume();return t.v;}
      if(t.t==='word'){
        const name=t.v;consume();
        if(peek()&&peek().t==='lparen'){
          consume();
          const args=parseCallArgs();
          if(peek()&&peek().t==='rparen')consume();
          if(name==='call'){
            const fnName=String(args[0]);
            return callUserFn(fnName,args.slice(1),vars);
          }
          if(fns[name]&&!['len','upper','lower','trim','sqrt','pow','abs','floor','ceil','round','push','pop','join','say','print'].includes(name)){
            return callUserFn(name,args,vars);
          }
          return callBuiltin(name,args,vars);
        }
        if(name==='true')return true;
        if(name==='false')return false;
        if(name==='null'||name==='nil')return null;
        if(name==='pi')return Math.PI;
        if(name==='e')return Math.E;
        if(name==='infinity')return Infinity;
        if(name==='nan')return NaN;
        const v=vars[name];
        return v!==undefined?v:0;
      }
      return undefined;
    }
    function parseMul(){
      let l=primary();
      while(pos<toks.length&&peek().t==='op'&&'*/%'.includes(peek().v)){
        const op=consume().v;
        const r=primary();
        if(op==='*')l=l*r;
        else if(op==='/')l=r!==0?l/r:'ERR:div0';
        else l=l%r;
      }
      return l;
    }
    function parseAdd(){
      let l=parseMul();
      while(pos<toks.length&&peek().t==='op'&&'+-'.includes(peek().v)){
        const op=consume().v;
        const r=parseMul();
        if(op==='+'){
          if(typeof l==='string'||typeof r==='string')l=displayVal(l)+displayVal(r);
          else l=l+r;
        }else l=Number(l)-Number(r);
      }
      return l;
    }
    function parseCmp(){
      let l=parseAdd();
      while(pos<toks.length&&peek().t==='cmp'){
        const op=consume().v;
        const r=parseAdd();
        if(op==='>')l=l>r;else if(op==='<')l=l<r;
        else if(op==='>=')l=l>=r;else if(op==='<=')l=l<=r;
        else if(op==='==')l=l==r;else if(op==='!=')l=l!=r;
      }
      return l;
    }
    function parseAnd(){
      let l=parseCmp();
      while(pos<toks.length&&peek().t==='word'&&peek().v==='and'){consume();const r=parseCmp();l=l&&r;}
      return l;
    }
    function parseOr(){
      let l=parseAnd();
      while(pos<toks.length&&peek().t==='word'&&peek().v==='or'){consume();const r=parseAnd();l=l||r;}
      return l;
    }
    function parseAssign(){return parseOr();}
    return parseAssign();
  }

  function displayVal(v){
    if(v===null||v===undefined)return 'null';
    if(Array.isArray(v))return '['+v.map(displayVal).join(', ')+']';
    if(typeof v==='object')return '{'+Object.entries(v).map(([k,vv])=>k+': '+displayVal(vv)).join(', ')+'}';
    return String(v);
  }

  function execBlock(blockLines,start,end,vars){
    let i=start;
    while(i<end){
      if(stepCount++>MAX_STEPS)throw new Error('Step limit reached');
      const raw=blockLines[i];
      const line=raw.trim();
      if(!line||line.startsWith('#')||line.startsWith('//')){i++;continue;}
      const toks=tokenize(line);
      if(!toks.length){i++;continue;}
      const kw=toks[0].v;

      if(kw==='set'&&toks[2]&&toks[2].v==='to'){
        const name=toks[1].v;
        vars[name]=evalExpr(toks.slice(3),vars);
        i++;continue;
      }
      if(kw==='delete'){vars[toks[1].v]=undefined;i++;continue;}
      if(kw==='say'||kw==='print'||kw==='say_err'||kw==='warn'||kw==='debug'){
        let val;
        if(toks.length===1){val='';}
        else{val=evalExpr(toks.slice(1),vars);}
        const text=displayVal(val);
        if(kw==='say_err'||kw==='warn')output.push({type:'warn',text:(kw==='warn'?'[warn] ':'')+text});
        else if(kw==='debug')output.push({type:'dbg',text:'[debug] '+text});
        else output.push({type:'ok',text});
        i++;continue;
      }
      if(kw==='clear_output'){output.length=0;i++;continue;}
      if(kw==='throw'){
        const val=evalExpr(toks.slice(1),vars);
        throw {__vxc_err__:true,message:displayVal(val)};
      }
      if(kw==='assert'){
        const args=evalExpr(toks.slice(1),vars);
        if(!args)throw {__vxc_err__:true,message:'Assertion failed'};
        i++;continue;
      }
      if(kw==='return'){
        const val=toks.length>1?evalExpr(toks.slice(1),vars):null;
        throw {__return__:true,value:val};
      }
      if(kw==='break')throw {__break__:true};
      if(kw==='continue')throw {__continue__:true};

      if(kw==='define'){
        const fname=toks[1].v;
        const params=[];
        for(let pi=3;pi<toks.length;pi++){if(toks[pi].t==='word')params.push(toks[pi].v);}
        let depth=1,j=i+1;
        while(j<end&&depth>0){
          const it=tokenize(blockLines[j].trim());
          if(it.length&&['define','if','loop','while','for_each','repeat','switch','try'].includes(it[0].v))depth++;
          if(it.length&&it[0].v==='end')depth--;
          if(depth>0)j++;
        }
        fns[fname]={params,body:blockLines.slice(i+1,j)};
        i=j+1;continue;
      }

      if(kw==='if'){
        const cond=evalExpr(toks.slice(1).filter(t=>t.v!=='then'),vars);
        let depth=1,j=i+1;
        const branches=[{cond,start:i+1}];
        while(j<end&&depth>0){
          const it=tokenize(blockLines[j].trim());
          if(!it.length){j++;continue;}
          if(['define','if','loop','while','for_each','repeat','switch','try'].includes(it[0].v))depth++;
          if(it[0].v==='end')depth--;
          if(depth===1&&it[0].v==='else'&&it[1]&&it[1].v==='if'){
            const c=evalExpr(it.slice(2),vars);
            branches[branches.length-1].end=j;
            branches.push({cond:c,start:j+1});
          }else if(depth===1&&it[0].v==='else'){
            branches[branches.length-1].end=j;
            branches.push({cond:true,start:j+1,isElse:true});
          }
          if(depth>0)j++;
        }
        branches[branches.length-1].end=j;
        let executed=false;
        for(const br of branches){
          if(!executed&&br.cond){
            execBlock(blockLines,br.start,br.end,vars);
            executed=true;
          }
        }
        i=j+1;continue;
      }

      if(kw==='loop'){
        const varName=toks[1].v;
        const limitExpr=toks.slice(3);
        let depth=1,j=i+1;
        while(j<end&&depth>0){
          const it=tokenize(blockLines[j].trim());
          if(it.length&&['define','if','loop','while','for_each','repeat','switch','try'].includes(it[0].v))depth++;
          if(it.length&&it[0].v==='end')depth--;
          if(depth>0)j++;
        }
        const bodyLines=blockLines.slice(i+1,j);
        while(vars[varName]<=evalExpr(limitExpr,vars)&&stepCount<MAX_STEPS){
          try{execBlock(bodyLines,0,bodyLines.length,vars);}
          catch(e){if(e&&e.__break__)break;if(e&&e.__continue__)continue;throw e;}
        }
        i=j+1;continue;
      }

      if(kw==='while'){
        const condToks=toks.slice(1);
        let depth=1,j=i+1;
        while(j<end&&depth>0){
          const it=tokenize(blockLines[j].trim());
          if(it.length&&['define','if','loop','while','for_each','repeat','switch','try'].includes(it[0].v))depth++;
          if(it.length&&it[0].v==='end')depth--;
          if(depth>0)j++;
        }
        const bodyLines=blockLines.slice(i+1,j);
        let wc=0;
        while(evalExpr(condToks,vars)&&stepCount<MAX_STEPS&&wc++<100000){
          try{execBlock(bodyLines,0,bodyLines.length,vars);}
          catch(e){if(e&&e.__break__)break;if(e&&e.__continue__)continue;throw e;}
        }
        i=j+1;continue;
      }

      if(kw==='repeat'){
        const count=evalExpr(toks.slice(1),vars);
        let depth=1,j=i+1;
        while(j<end&&depth>0){
          const it=tokenize(blockLines[j].trim());
          if(it.length&&['define','if','loop','while','for_each','repeat','switch','try'].includes(it[0].v))depth++;
          if(it.length&&it[0].v==='end')depth--;
          if(depth>0)j++;
        }
        const bodyLines=blockLines.slice(i+1,j);
        for(let ri=0;ri<Number(count)&&stepCount<MAX_STEPS;ri++){
          try{execBlock(bodyLines,0,bodyLines.length,vars);}
          catch(e){if(e&&e.__break__)break;if(e&&e.__continue__)continue;throw e;}
        }
        i=j+1;continue;
      }

      if(kw==='for_each'){
        const itemVar=toks[1].v;
        const arrVal=vars[toks[3].v];
        let depth=1,j=i+1;
        while(j<end&&depth>0){
          const it=tokenize(blockLines[j].trim());
          if(it.length&&['define','if','loop','while','for_each','repeat','switch','try'].includes(it[0].v))depth++;
          if(it.length&&it[0].v==='end')depth--;
          if(depth>0)j++;
        }
        const bodyLines=blockLines.slice(i+1,j);
        const items=Array.isArray(arrVal)?arrVal:(typeof arrVal==='string'?arrVal.split(''):Object.values(arrVal||{}));
        for(const item of items){
          vars[itemVar]=item;
          try{execBlock(bodyLines,0,bodyLines.length,vars);}
          catch(e){if(e&&e.__break__)break;if(e&&e.__continue__)continue;throw e;}
        }
        i=j+1;continue;
      }

      if(kw==='switch'){
        const switchVal=evalExpr(toks.slice(1),vars);
        let depth=1,j=i+1;
        while(j<end&&depth>0){
          const it=tokenize(blockLines[j].trim());
          if(it.length&&['define','if','loop','while','for_each','repeat','switch','try'].includes(it[0].v))depth++;
          if(it.length&&it[0].v==='end')depth--;
          if(depth>0)j++;
        }
        const switchEnd=j;
        let si=i+1;let matched=false;
        while(si<switchEnd){
          const sit=tokenize(blockLines[si].trim());
          if(!sit.length){si++;continue;}
          if(sit[0].v==='case'||sit[0].v==='default'){
            const caseVal=sit[0].v==='default'?switchVal:evalExpr(sit.slice(1),vars);
            let depth2=1,ej=si+1;
            while(ej<switchEnd&&depth2>0){
              const et=tokenize(blockLines[ej].trim());
              if(et.length&&['define','if','loop','while','for_each','repeat','switch','try','case','default'].includes(et[0].v)&&et[0].v!=='end')depth2++;
              if(et.length&&et[0].v==='end')depth2--;
              if(depth2>0)ej++;
            }
            if(!matched&&(sit[0].v==='default'||caseVal==switchVal)){
              matched=true;
              execBlock(blockLines,si+1,ej,vars);
            }
            si=ej+1;
          }else si++;
        }
        i=switchEnd+1;continue;
      }

      if(kw==='try'){
        let depth=1,j=i+1;
        let catchStart=-1,catchVar='';
        while(j<end&&depth>0){
          const it=tokenize(blockLines[j].trim());
          if(it.length&&['define','if','loop','while','for_each','repeat','switch','try'].includes(it[0].v))depth++;
          if(it.length&&it[0].v==='end')depth--;
          if(depth===1&&it[0].v==='catch'){catchStart=j;catchVar=it[1]?it[1].v:'err';}
          if(depth>0)j++;
        }
        const tryEnd=catchStart>-1?catchStart:j;
        const catchEnd=j;
        try{
          execBlock(blockLines,i+1,tryEnd,vars);
        }catch(e){
          if(e&&e.__return__)throw e;
          if(e&&e.__break__)throw e;
          if(e&&e.__continue__)throw e;
          if(catchStart>-1){
            const msg=e&&e.__vxc_err__?e.message:(e&&e.message?e.message:String(e));
            vars[catchVar]=msg;
            execBlock(blockLines,catchStart+1,catchEnd,vars);
          }
        }
        i=catchEnd+1;continue;
      }

      if(kw==='call'){
        const fnName=toks[1].v;
        if(toks[2]&&toks[2].t==='lparen'){
          const argToks=toks.slice(2);
          const args=evalExpr(argToks,vars);
          callUserFn(fnName,Array.isArray(args)?args:[args],vars);
        }else{
          callUserFn(fnName,[],vars);
        }
        i++;continue;
      }

      if(toks[1]&&toks[1].v==='to'&&kw!=='set'){
        vars[kw]=evalExpr(toks.slice(2),vars);
        i++;continue;
      }

      if(toks[0].t==='word'&&toks[1]&&toks[1].t==='lparen'){
        const fname=toks[0].v;
        const fToks=toks.slice(1);
        const val=evalExpr([toks[0],...fToks],vars);
        i++;continue;
      }

      output.push({type:'err',text:'Unknown: '+line});
      i++;
    }
  }

  try{execBlock(lines,0,lines.length,vars);}
  catch(e){
    if(e&&e.__vxc_err__)output.push({type:'err',text:'Error: '+e.message});
    else if(e&&e.message)output.push({type:'err',text:'Runtime error: '+e.message});
    else if(e&&!e.__return__&&!e.__break__)output.push({type:'err',text:'Error: '+String(e)});
  }
  return output;
}

document.getElementById('runBtn').onclick=()=>{
  const code=document.getElementById('editor').value;
  const stdinRaw=document.getElementById('stdin-input').value;
  const stdinTokens=stdinRaw?stdinRaw.split(','):[];
  const result=runVXC(code,stdinTokens);
  const out=document.getElementById('output');
  if(!result.length){out.innerHTML='<span class="info">Program ran with no output.</span>';return;}
  out.innerHTML=result.map(r=>`<span class="${r.type}">${r.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`).join('\n');
};

document.getElementById('clearBtn').onclick=()=>{document.getElementById('output').innerHTML='<span class="info">Output cleared.</span>';};
document.getElementById('resetBtn').onclick=()=>{document.getElementById('output').innerHTML='<span class="info">Ready.</span>';};

document.querySelectorAll('.ex-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.getElementById('editor').value=EXAMPLES[btn.dataset.ex]||'';
    document.getElementById('output').innerHTML='<span class="info">Press Run to execute.</span>';
  };
});

document.querySelectorAll('.doc-btn').forEach(btn=>{
  btn.onclick=()=>{
    const out=document.getElementById('output');
    const doc=DOCS[btn.dataset.doc]||'No docs found.';
    out.innerHTML='<span class="info">'+doc.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</span>';
  };
});

document.getElementById('editor').addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();const s=e.target.selectionStart,en=e.target.selectionEnd;e.target.value=e.target.value.substring(0,s)+'  '+e.target.value.substring(en);e.target.selectionStart=e.target.selectionEnd=s+2;}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){document.getElementById('runBtn').click();}
});
</script>
