<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spazzy Games</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Fredoka', sans-serif;
    background: linear-gradient(to bottom, #ffe6f0, #dff6ff);
    overflow-x: hidden;
}

/* Floating eggs */
.egg {
    position: fixed;
    width: 40px;
    height: 50px;
    background: radial-gradient(circle at 30% 30%, white, pink);
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0.5;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-100px); }
}

/* Header */
header {
    text-align: center;
    padding: 40px;
    background: linear-gradient(to right, #ffb6c1, #ffd700);
    color: white;
    position: relative;
}

header h1 {
    font-size: 3.5em;
    margin: 0;
}

/* Grass */
header::after {
    content: "";
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 30px;
    background: repeating-linear-gradient(
        45deg,
        #32cd32,
        #32cd32 10px,
        #2ecc71 10px,
        #2ecc71 20px
    );
}

/* Container */
.container {
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

/* Game cards */
.game {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    border: 3px solid #ffd700;
    transition: 0.2s;
}

.game:hover {
    transform: scale(1.03);
}

.game h2 {
    color: #ff69b4;
}

.release {
    color: gray;
    font-size: 0.9em;
}

/* Buttons */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(to right, #ff69b4, #ffb6c1);
    color: white;
    cursor: pointer;
    font-size: 1em;
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    color: gray;
}

/* Bunny bounce */
.bunny {
    font-size: 40px;
    animation: bounce 1s infinite alternate;
}

@keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
}
</style>
</head>

<body>

<!-- Floating eggs -->
<script>
for (let i = 0; i < 15; i++) {
    let egg = document.createElement("div");
    egg.className = "egg";
    egg.style.left = Math.random() * 100 + "vw";
    egg.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(egg);
}
</script>

<header>
    <div class="bunny">🐰</div>
    <h1>Spazzy Games</h1>
    <p>Egg-citing games made by me!</p>
</header>

<div class="container">
    <div id="gamesList"></div>
</div>

<footer>
    🥚 © 2026 Spazzy Roblox Games
</footer>

<script>

/* 
========================================
🎮 EDIT YOUR GAMES HERE ONLY
========================================
*/

let games = [
    {
        title: "Egg Muncher",
        desc: "Run around in a colorful world and find as many eggs as possible before time runs out!",
        date: "2026-04-06",
        link: "https://www.roblox.com/games/86291031595536/Egg-Muncher"
    }
];

function renderGames() {
    const list = document.getElementById("gamesList");
    list.innerHTML = "";

    games.forEach(game => {
        list.innerHTML += `
            <div class="game">
                <h2>${game.title}</h2>
                <p>${game.desc}</p>
                <div class="release">Release Date: ${game.date}</div>
                <br>
                <a href="${game.link}" target="_blank">
                    <button>🎮 Play Game</button>
                </a>
            </div>
        `;
    });
}

renderGames();
</script>

</body>
</html>
